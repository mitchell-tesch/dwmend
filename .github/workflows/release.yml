name: Release

# Triggered by pushing a tag matching `v*` (e.g. `v0.2.0`, `v0.3.0-rc.1`).
# The tag is the source of truth for the release version; we cross-check
# it against `Cargo.toml` so a misaligned tag fails fast instead of
# shipping a binary whose embedded VS_VERSION_INFO disagrees with the
# release page.
on:
  push:
    tags:
      - 'v*'

# Releases mutate repository state (uploaded assets, GitHub Release
# object). A concurrency guard keyed on the tag prevents two runs from
# racing each other if the tag is force-pushed during a build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# `softprops/action-gh-release` needs `contents: write` to create the
# release object and upload assets. No other write scopes required.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  release:
    name: Build and publish
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml pins the channel + components; this action
        # honours that file so we don't repeat the version here.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      # Catch the most common release mistake: tag pushed without
      # bumping `Cargo.toml`. Fail before we burn the rest of the
      # build minutes (and before the bad binary reaches users).
      - name: Verify tag matches workspace version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $line = Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $line) {
            Write-Error "Could not find a version line in Cargo.toml"
            exit 1
          }
          $cargo = $line.Matches[0].Groups[1].Value
          if ($tag -ne $cargo) {
            Write-Error "Tag '${{ github.ref_name }}' (= $tag) does not match Cargo.toml version '$cargo'"
            exit 1
          }
          Write-Host "Tag $tag matches Cargo.toml"

      # Belt-and-braces: only ship a release if the test suite is green
      # on this exact commit. CI on `main` should already have run, but
      # tags can be applied to any commit and we don't want to discover
      # a regression in user feedback.
      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo build --release
        run: cargo build --workspace --release

      # SHA-256 in `sha256sum -b` binary-mode format (`<hex> *<file>`)
      # so users can verify with either PowerShell `Get-FileHash` or
      # GNU `sha256sum -c` from WSL / Git Bash.
      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 target\release\dwmend.exe).Hash.ToLower()
          "$hash *dwmend.exe" | Out-File -Encoding ASCII -NoNewline target\release\dwmend.exe.sha256

      # ---- MSI installer build ------------------------------------------
      #
      # Produces a per-user installer (`%LOCALAPPDATA%\Programs\dwmend`,
      # no UAC prompt) authored in `crates/dwmend/wix/main.wxs`. The MSI
      # is attached to the GitHub Release alongside the portable .exe so
      # users can pick whichever distribution model fits.

      - name: Install WiX Toolset v3
        shell: pwsh
        # `windows-latest` ships with a recent WiX 3.x preinstalled.
        # `choco install wixtoolset --version=3.14.1` fails when a NEWER
        # version is already present, which kills the whole job. Probe
        # PATH and the standard install locations first; only fall back
        # to choco if WiX is genuinely absent.
        run: |
          $ErrorActionPreference = 'Stop'

          # 1. Already on PATH? Trust it.
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if ($candle) {
            Write-Host "WiX already on PATH: $($candle.Source)"
            exit 0
          }

          # 2. Common preinstalled locations on windows-latest. Match any
          #    3.x version so a runner image bump doesn't break us.
          $bin = Get-ChildItem `
              'C:\Program Files (x86)\WiX Toolset v3.*\bin' `
              -Directory -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              Select-Object -First 1

          if ($bin -and (Test-Path "$($bin.FullName)\candle.exe")) {
            Write-Host "Found preinstalled WiX at $($bin.FullName)"
            Add-Content -Path $env:GITHUB_PATH -Value $bin.FullName
            exit 0
          }

          # 3. Genuinely missing \u2014 install whatever choco has.
          Write-Host "WiX not preinstalled; installing via Chocolatey"
          choco install wixtoolset -y --no-progress
          $bin = Get-ChildItem `
              'C:\Program Files (x86)\WiX Toolset v3.*\bin' `
              -Directory -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              Select-Object -First 1
          if (-not $bin) {
            Write-Error "WiX bin directory not found after install"
            exit 1
          }
          Add-Content -Path $env:GITHUB_PATH -Value $bin.FullName

      - name: Install cargo-wix
        # `--locked` keeps the install reproducible; the rust-cache step
        # above also caches `~/.cargo/bin` so this is a no-op on subsequent
        # release builds with the same cargo-wix version.
        run: cargo install cargo-wix --locked

      - name: Build MSI
        # `--no-build` re-uses the release artifact produced earlier in
        # this workflow rather than rebuilding from scratch. `--nocapture`
        # makes WiX output visible if linking fails.
        run: cargo wix -p dwmend --no-build --nocapture --output target\wix\dwmend.msi

      - name: Compute MSI SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 target\wix\dwmend.msi).Hash.ToLower()
          "$hash *dwmend.msi" | Out-File -Encoding ASCII -NoNewline target\wix\dwmend.msi.sha256

      # Stage everything we want attached to the GitHub Release in a
      # single directory so the upload step has a flat file list.
      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item target\release\dwmend.exe artifacts\
          Copy-Item target\release\dwmend.exe.sha256 artifacts\
          Copy-Item target\wix\dwmend.msi artifacts\
          Copy-Item target\wix\dwmend.msi.sha256 artifacts\
          Copy-Item assets\config.toml artifacts\dwmend.config.example.toml

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dwmend.exe
            artifacts/dwmend.exe.sha256
            artifacts/dwmend.msi
            artifacts/dwmend.msi.sha256
            artifacts/dwmend.config.example.toml
          # Auto-populate the release body with a "what's changed"
          # section derived from PR titles since the previous tag.
          generate_release_notes: true
          # Tags containing a hyphen (`v0.3.0-rc.1`, `-beta`, `-alpha`)
          # are treated as pre-releases so they don't show up as the
          # "Latest" link on the repo home page.
          prerelease: ${{ contains(github.ref_name, '-') }}
